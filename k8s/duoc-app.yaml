apiVersion: apps/v1
kind: Deployment
metadata:
  name: duoc-app-rolling
  labels:
    app: duoc-app
    version: rolling
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: duoc-app
      version: rolling
  template:
    metadata:
      labels:
        app: duoc-app
        version: rolling
    spec:
      containers:
      - name: duoc-container
        image: ghcr.io/crlealb/duoc-app:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 3000
          name: http
        livenessProbe:
          httpGet:
            path: /
            port: 3000
          initialDelaySeconds: 20
          periodSeconds: 15
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /
            port: 3000
          initialDelaySeconds: 10
          periodSeconds: 5
          failureThreshold: 3
        resources:
          requests:
            cpu: "100m"
            memory: "128Mi"
          limits:
            cpu: "500m"
            memory: "512Mi"
---
