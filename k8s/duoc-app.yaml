apiVersion: apps/v1
kind: Deployment
metadata:
  name: duoc-app-rolling
  labels:
    app: duoc-app
    version: rolling
spec:
  replicas: 2
  selector:
    matchLabels:
      app: duoc-app
      version: rolling
  template:
    metadata:
      labels:
        app: duoc-app
        version: rolling
    spec:
      containers:
      - name: duoc-container
        image: crlealb/AUY1104-CICLO-DE-VIDA-DEL-SOFTWARE-II:latest
        ports:
        - containerPort: 3000
        livenessProbe:
          httpGet:
            path: /
            port: 3000
          initialDelaySeconds: 15
          periodSeconds: 20
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /
            port: 3000
          initialDelaySeconds: 5
          periodSeconds: 10
        resources:
          requests:
            cpu: "100m"
            memory: "128Mi"
          limits:
            cpu: "250m"
            memory: "256Mi"
---
